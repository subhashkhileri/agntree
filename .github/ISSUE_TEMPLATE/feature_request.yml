name: Feature Request
description: Suggest a new feature for Agntree
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please describe the problem you're trying to solve.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Describe the pain point.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?

  - type: dropdown
    id: agent
    attributes:
      label: Related AI Coding Agent
      description: Is this feature specific to a particular AI coding agent?
      options:
        - All agents
        - Claude Code
        - GitHub Copilot
        - Cline
        - Aider
        - Windsurf
        - Continue.dev
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or examples.
