name: Bug Report
description: Report a bug in Agntree
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the information below to help us investigate.

  - type: dropdown
    id: agent
    attributes:
      label: AI Coding Agent
      description: Which AI coding agent are you using with Agntree?
      options:
        - Claude Code
        - Other
    validations:
      required: true

  - type: dropdown
    id: ide
    attributes:
      label: IDE
      description: Which IDE are you using?
      options:
        - VS Code
        - Cursor
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Agntree Version
      description: "Run `code --list-extensions --show-versions | grep agntree` to find your version"
      placeholder: "0.1.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Open Agntree sidebar
        2. Click on...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: "Check View → Output → Log (Extension Host) for errors. Paste relevant logs here."
      render: shell

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15.2 / Windows 11 / Ubuntu 24.04"
